services:
  app:
    image: node:22-alpine
    working_dir: /app
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://formrelay:formrelay@postgres:5432/formrelay?schema=public
      DIRECT_URL: postgresql://formrelay:formrelay@postgres:5432/formrelay?schema=public
      NEXT_PUBLIC_APP_URL: http://localhost:3000
    volumes:
      - ./:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    command: sh -c "npm install && npx prisma generate && npm run dev"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: formrelay
      POSTGRES_USER: formrelay
      POSTGRES_PASSWORD: formrelay
    ports:
      - "5188:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U formrelay -d formrelay"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
